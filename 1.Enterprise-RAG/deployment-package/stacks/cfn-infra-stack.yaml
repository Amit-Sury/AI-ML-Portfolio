AWSTemplateFormatVersion: '2010-09-09'
Description: Creates infrastructure resources (IAM roles, cognito, APIGateway, VPC Link, valkey cluster) for enterprise-rag

####################### Parameter Block BEGIN ########################
Parameters:
  PrefixName:
    Description: This is the prefix to use for all the resources
    Type: String
    Default: enterprise-rag

  # eks vpc id
  VPCId:
    Description: The VPC ID created by eksctl where EKS is running.
    Type: AWS::EC2::VPC::Id

  # eks private subnets id
  PrivateSubnetIds:
    Description: Private subnet IDs where the internal NLB will live.    
    Type: List<AWS::EC2::Subnet::Id>

  # eks node group
  EksNodeSecurityGroup:
    Type: String
    
  #cognito managed login version
  ManagedLoginVersion:
    Description: Managed login version for cognito 
    Type: String
    Default: 2
  
######################## END  ###################################

################ Resource Block BEGIN ###########################
Resources:
  # -------------------
  # IAM role for retrieval service
  # -------------------
  RetrievalServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${PrefixName}-retrieval-service-role
      Description: IAM Role for retrieval service pods to access Bedrock and OpenSearch Serverless.
      # Allows EKS Pod Identity or OIDC provider to assume this role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action: 
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: !Sub ${PrefixName}-retrieval-service-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Bedrock Model Permissions
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream                  
                Resource: 
                  - 'arn:aws:bedrock:*::foundation-model/*'
              # Bedrock Guardrail Permissions
              - Effect: Allow
                Action:
                  - bedrock:ApplyGuardrail
                Resource: 
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail/*'                  
              # OpenSearch Serverless Vector DB Permissions
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource: "*"
                  #- !Sub 'arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/${PrefixName}-collection'
              
  # -------------------
  # IAM role for External Secrets Operator
  # -------------------
  ESOServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${PrefixName}-eso-role
      Description: IAM Role for External Secrets Operator to access Parameter Store and Secrets Manager

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession

      Policies:
        - PolicyName: !Sub ${PrefixName}-eso-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              # Parameter Store Access
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: "*"
              
              # Secrets Manager Access
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: "*"

  # -------------------
  # IAM role for Fluentbit to enable logs in cloudwatch
  # -------------------
  FluentbitRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${PrefixName}-fluentbit-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: !Sub ${PrefixName}-fluentbit-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource: '*'

  # -------------------
  # VPC Link security group
  # -------------------
  VpcLinkSecurityGroup:  
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for API Gateway VPC Link
      VpcId: !Ref VPCId
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  # -------------------
  # VPC Link
  # -------------------
  ApiGwVpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: !Sub ${PrefixName}-eks-vpc-link
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VpcLinkSecurityGroup

  # -------------------
  # API Gateway for HTTP APIs
  # -------------------
  APIGatewayHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${PrefixName}-http-apigateway
      ProtocolType: HTTP
      Description: HTTP API Gateway routing traffic to EKS FastAPI via VPC Link.

  # -------------------
  # Cognito user pool
  # ------------------- 
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${PrefixName}-userpool
      UsernameConfiguration:
        CaseSensitive: false
      AliasAttributes:              # Allow login with either username or email
        - email
      AdminCreateUserConfig:        # Enable self-registration
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:       # Automatically verify email addresses
        - email
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: true
          Mutable: true
  
  # -------------------
  # Cognito domain prefix for the Hosted UI
  # -------------------   
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${PrefixName}
      UserPoolId: !Ref UserPool
      ManagedLoginVersion: !Ref ManagedLoginVersion

  # -------------------
  # Cognito app client
  # -------------------  
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - APIGatewayHttpApi
    Properties:
      ClientName: !Sub ${PrefixName}-login-client
      UserPoolId: !Ref UserPool
      GenerateSecret: true        # Keep true if FastAPI backend performs token exchange
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs:
        - !Sub
          - '${ApiEndpoint}/'
          - ApiEndpoint: !GetAtt APIGatewayHttpApi.ApiEndpoint        
      LogoutURLs:
        - !Sub
          - '${ApiEndpoint}/logged-out'
          - ApiEndpoint: !GetAtt APIGatewayHttpApi.ApiEndpoint 
      SupportedIdentityProviders:
        - COGNITO

  # -------------------
  # Cognito managed login branding
  # -------------------  
  ManagedLoginBranding:
    Type : AWS::Cognito::ManagedLoginBranding
    Properties:
      Assets:
      - Bytes: 
        Category: PAGE_BACKGROUND
        ColorMode: LIGHT
        Extension: PNG  
      Settings:        
        components:      
          primaryButton:        
            lightMode:        
              defaults:
                backgroundColor: 4f7ea8ff
                textColor: ffffffff                
      UseCognitoProvidedValues: false
      UserPoolId: !Ref UserPool
      ClientId: !Ref UserPoolClient

  # -------------------
  # IAM role for api gateway authorization lambda
  # -------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${PrefixName}-authorization-lambda-execution-role
      Description: IAM Role for authorization lambda function which used by api gateway
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 
              - sts:AssumeRole              
  
  # -------------------
  # Authorization lambda
  # -------------------
  AuthorizationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${PrefixName}-authorization-lambda
      Runtime: python3.13
      Handler: apigateway_authorizer_lambda.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 3000
      Timeout: 60
      Code:
        S3Bucket: !ImportValue cfn-s3-stack-LambdaArtifactBucketName
        S3Key: authorizer-lambda.zip
      Layers:
        - !Ref AuthorizationLambdaLayer
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_APP_CLIENT_ID: !Ref UserPoolClient

  # --------------------------------
  #Authorization lambda layer
  # --------------------------------    
  AuthorizationLambdaLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub ${PrefixName}-authorization-lambda-layer
      Content:
        S3Bucket: !ImportValue cfn-s3-stack-LambdaArtifactBucketName
        S3Key: authorizer-lambda-layer.zip
      CompatibleRuntimes:
        - python3.13

  # -------------------
  # API Gateway JWT lambda Authorizer to authorize jwt present in Cookie header
  # -------------------   
  ApiJwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    DependsOn: AuthorizationLambda
    Properties:
      Name: !Sub ${PrefixName}-LambdaJwtAuthorizer
      ApiId: !Ref APIGatewayHttpApi
      AuthorizerType: REQUEST
      AuthorizerPayloadFormatVersion: "2.0"
      EnableSimpleResponses: true
      IdentitySource:
        - '$request.header.Cookie' # Custom configuration to intercept secure cookies        
      AuthorizerUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizationLambda.Arn}/invocations

  # -------------------
  # API Gateway JWT lambda Authorizer permission
  # -------------------  
  ApiGatewayInvokeAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthorizationLambda
      Principal: apigateway.amazonaws.com
      SourceAccount: !Ref 'AWS::AccountId'
  
  # -------------------
  # Valkey cache security group
  # -------------------  
  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow EKS to access Valkey
      VpcId: !Ref VPCId
      Tags:
        - Key: Name
          Value: !Sub ${PrefixName}-cache-securitygrp
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref EksNodeSecurityGroup

  # -------------------
  # Valkey cache cluster
  # -------------------  
  ValkeyCluster:
    Type: AWS::ElastiCache::ServerlessCache
    Properties:
      ServerlessCacheName: !Sub ${PrefixName}-valkey-cache
      Engine: valkey
      SecurityGroupIds:
        - !Ref CacheSecurityGroup
      SubnetIds: !Ref PrivateSubnetIds
        
##################### Resource Block END #####################

##################### Output Block BEGIN #####################
Outputs:
  oRetrievalServiceRole:
    Description: Give this ARN to your EKS admin to bind to the Kubernetes service account.
    Value: !GetAtt RetrievalServiceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RetrievalServiceRoleArn"

  oESOServiceRole:
    Description: Give this ARN to your EKS admin to bind to the Kubernetes service account.
    Value: !GetAtt ESOServiceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ESOServiceRoleArn"  
  
  oFluentbitServiceRole:
    Description: Give this ARN to your EKS admin to bind to the Kubernetes service account.
    Value: !GetAtt FluentbitRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FluentbitServiceRoleArn"  

  oVpcLinkId:
    Description: Use this ID when creating the API Gateway route integration later.
    Value: !Ref ApiGwVpcLink
    Export:
      Name: !Sub "${AWS::StackName}-VpcLinkId"

  oAPIGatewayId:
    Description: Use this ID when creating the API Gateway route integration later.
    Value: !Ref APIGatewayHttpApi
    Export:
      Name: !Sub "${AWS::StackName}-APIGatewayId"

  oHttpApiGatewayUrl:
    Description: The public endpoint URL for users to access the RAG system.
    Value: !GetAtt APIGatewayHttpApi.ApiEndpoint   
    Export:
      Name: !Sub "${AWS::StackName}-APIGatewayUrl"

  oApiJwtAuthorizer:
    Description: Authorizer of api gateway
    Value: !Ref ApiJwtAuthorizer
    Export:
      Name: !Sub "${AWS::StackName}-ApiJwtAuthorizer"      

  oCognitoUserpoolClientID:
    Description: Cognito UserPool client Id.
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserpoolClientID"

  oCognitoUserpoolID:
    Description: Cognito UserPool Id.
    Value: !Ref UserPool
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserpoolID"
  
  oValkeyEndpoint:
    Description: Valkey endpoint
    Value: !GetAtt ValkeyCluster.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-ValkeyEndpoint" 

  oValkeyPort:
    Description: Valkey port
    Value: !GetAtt ValkeyCluster.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-ValkeyPort"

##################### Output Block END #####################